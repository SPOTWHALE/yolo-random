name: candidate count
on:
  push:
    branches: [main]
    paths: [CANDIDATES.md]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count candidates and write badge JSON
        run: |
          n=$(sed -n '/<!-- candidates:start -->/,/<!-- candidates:end -->/p' CANDIDATES.md \
            | grep -E '^\|' | grep -vE '^\| *Repo *\|' | grep -vE '^\|[ :|-]+\|' \
            | grep -v '_add yours here_' | wc -l | tr -d ' ')
          printf '{"schemaVersion":1,"label":"candidates","message":"%s","color":"blue"}\n' "$n" \
            > .github/badges/candidates.json
      - name: Commit if changed
        run: |
          if ! git diff --quiet .github/badges/candidates.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/badges/candidates.json
            git commit -m "chore: update candidate count badge [skip ci]"
            git push
          fi
